<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terms of Service | SmartSpend</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #060d12;
            --surf: #0c1a22;
            --card: #0f1e28;
            --border: rgba(255, 255, 255, 0.065);
            --text: #dff0ea;
            --muted: #6a9080;
            --g: #39ff7e;
        }
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }
        nav {
            padding: 1.5rem 5%;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
        }
        nav a {
            color: var(--text);
            text-decoration: none;
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header {
            padding: 6rem 5% 4rem;
            text-align: center;
            border-bottom: 1px solid var(--border);
            background: var(--surf);
        }
        .header h1 {
            font-family: 'Syne', sans-serif;
            font-size: 3rem;
            margin-bottom: 1rem;
            color: var(--g);
        }
        .header p {
            color: var(--muted);
            font-size: 1.1rem;
            max-width: 600px;
            margin: 0 auto;
        }
        .content {
            max-width: 800px;
            margin: 4rem auto;
            padding: 0 5%;
            color: var(--muted);
        }
    </style>
</head>
<body>
    <nav>
        <a href="/">
            <span style="width:32px; height:32px; background:var(--g); border-radius:8px; display:inline-block;"></span>
            SmartSpend
        </a>
    </nav>
    <div class="header">
        <h1>Terms of Service</h1>
        <p>The rules and guidelines for using the SmartSpend platform.</p>
    </div>
    <div class="content">
        <p>This is a placeholder page for <strong>Terms of Service</strong>. The content for this page is currently under development.</p>
        <br>
        <a href="/" style="color: var(--g); text-decoration: none;">← Return to Home</a>
    </div>
</body>
</html>
